services:
  app:
    build: .
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      DATABASE_PATH: /data/ai-chat.db
      MEMORY_VOLUME: /memory
      DOCUMENTS_VOLUME: /documents
      WORKSPACES_VOLUME: /workspaces
    volumes:
      - data:/data
      - memory:/memory
      - documents:/documents
      - workspaces:/workspaces
    restart: unless-stopped

volumes:
  data:
  memory:
  documents:
  workspaces:
